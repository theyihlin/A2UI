name: Angular

on:
  push:
    branches: [main]
    paths-ignore:
      - "samples/agent/adk/**"
  pull_request:
    paths-ignore:
      - "samples/agent/adk/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [test, restaurant, rizzcharts, orchestrator, explorer]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache Node modules and Wireit
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            **/.wireit
          key: ${{ runner.os }}-node-and-wireit-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-and-wireit-

      - name: Install top-level deps
        working-directory: ./samples/client/angular
        run: npm i

      - name: Run task
        run: |
          case "${{ matrix.task }}" in
            test)
              cd ./renderers/angular && npm run test:ci
              ;;
            explorer)
              cd ./renderers/angular && npx ng test a2ui_explorer --watch=false --browsers=ChromeHeadless
              ;;
            restaurant)
              cd ./samples/client/angular && npm run build restaurant
              ;;
            rizzcharts)
              cd ./samples/client/angular && npm run build rizzcharts
              ;;
            orchestrator)
              cd ./samples/client/angular && npm run build orchestrator
              ;;
          esac
