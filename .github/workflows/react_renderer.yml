name: React renderer

on:
  push:
    branches: [main]
    paths-ignore:
      - "renderers/angular/**"
      - "renderers/flutter/**"
      - "renderers/lit/**"
      - "samples/agent/adk/**"
  pull_request:
    paths-ignore:
      - "renderers/angular/**"
      - "renderers/flutter/**"
      - "renderers/lit/**"
      - "samples/agent/adk/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [test, demo, lint]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache Node modules and Wireit
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            **/.wireit
          key: ${{ runner.os }}-node-and-wireit-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-and-wireit-

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          npm i
          npm run build

      - name: Build markdown-it dependency
        working-directory: ./renderers/markdown/markdown-it
        run: |
          npm i
          npm run build

      - name: Install React renderer deps
        working-directory: ./renderers/react
        run: npm i

      - name: Run task
        working-directory: ./renderers/react
        run: |
          case "${{ matrix.task }}" in
            test)
              npm run build
              npm test
              ;;
            demo)
              npm run build:demo
              npm run test:demo
              ;;
            lint)
              npm run lint
              ;;
          esac
